<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Números com JS</title>
    <style>
        body{
            font: normal 12pt Arial;
        }
        button#btn{
            height: 80px;
            width: 170px;
            font: normal 12pt Arial;
            background-color: lightgreen;
            border-radius: 10px;
        }
        div#res{
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Média do aluno v1.0</h1>
    <button id="btn">Calcular média</button>
    <div id="res">O resultado vai aparecer aqui...</div>

    <script>
        document.getElementById("btn").addEventListener("click", calcular)
        
        
        function calcular(){
            var nome = window.prompt("Qual é o nome do aluno?")
            var n1 = Number(window.prompt(`Qual foi a primeira nota de ${nome}`))
            var n2 = Number(window.prompt(`Além de ${n1}, qual foi a outra nota de ${nome}?`))
            var m = (n1 + n2) / 2
            document.getElementById("res").innerHTML = `<p>Calculando a média de <mark>${nome}</mark>.</p> <p>As notas obtidas foram <mark>${n1} e ${n2}</mark>.</p> <p>A média final será <mark>${m}</mark>.</p>` 
        }
        
    </script>
</body>
</html>
