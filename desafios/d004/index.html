<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados com JS</title>
    <style>
        body{
            font: normal 12pt Arial;
        }
        button#btn{
            height: 80px;
            width: 210px;
            font: normal 12pt Arial;
            background-color: lightcoral;
            border-radius: 10px;
        }
        div#res{
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Trabalhando com Dados v2.0</h1>
    <button id="btn">Clique para começar</button>
    <div id="res">Aqui vai aparecer o resultado</div>

    <script>
        var botao = document.getElementById("btn")
        botao.addEventListener("click", clicar)

        function clicar(){
            var nome = window.prompt("Qual é o seu nome?")
            document.getElementById("res").innerHTML = `Olá, <strong>${nome}</strong>! É um grande prazer te conhecer! 🖖`
        }
    </script>
</body>
</html>
