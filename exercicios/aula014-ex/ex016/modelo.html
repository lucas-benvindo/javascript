<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Contador</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <h1>Vamos contar</h1>
    </header>
    <section>
        <div>
            <label for="in1">Início:</label>
            <input type="number" name="n1" id="in1">
        </div>
        <div>
            <label for="in2">Fim:</label>
            <input type="number" name="n2" id="in2">
        </div>
        <div>
            <label for="ipasso">Passo:</label>
            <input type="number" name="passo" id="ipasso">
        </div>
        <button id="btn-contar">Contar</button>
        <p id="res">Preparando a contagem...</p>
    </section>
    <footer>
        <p>© Curso em Vídeo</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
