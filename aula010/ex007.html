<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Números</title>
    <style>
        body{
            font: normal 20pt Arial;
        }
        div#res{
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <h1>Somando Valores</h1>
    <input type="number" name="n1" id="tn1">
    <span>+</span>
    <input type="number" name="n2" id="tn2">
    <input id="btn" type="button" value="somar">
    <div id="res">Resultado</div>

    <script>
        var botao = document.getElementById("btn")
        botao.addEventListener("click", somar)

        function somar(){
            var n1 = Number(document.getElementById("tn1").value)
            var n2 = Number(document.getElementById("tn2").value)
            var res = document.getElementById("res")
            var s = n1 + n2

            res.innerText = `A soma entre ${n1} e ${n2} é igual a ${s}`
        }
        
    </script>
</body>
</html>
